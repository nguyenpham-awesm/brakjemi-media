name: publish-replay
on:
  schedule:
    # setup script replaces */30 16-23 * * * (default: every 30 min during evening hours UTC)
    - cron: "*/30 16-23 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = only report what would be published, no upload"
        required: false
        default: "1"
permissions:
  contents: write
  actions: write   # disable its own schedule after publish / give-up
  issues: write    # open an issue if it gives up at T+220
concurrency:
  group: publish-replay
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: publish newest Zoom recording
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZOOM_HOST: "WhNGXd5yTYOdiyFNONzpZA"
          MIN_DATE: "2026-07-22"
          MEETING_ID: ""
          MATCH_FROM: ""
          MATCH_TO: ""
          STOP_AFTER_PUBLISH: "0"
          WEBINAR_START: ""
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          RELEASE_TAG: "opptak"
          ASSET_NAME: "magnetmetoden-opptak.mp4"
          DRY_RUN: ${{ github.event.inputs.dry_run || '' }}
        run: python publish_recording.py
